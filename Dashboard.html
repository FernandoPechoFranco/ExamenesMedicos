<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#0f766e">
  <title>MedCare | Dashboard</title>
  <link rel="icon" href="assets/icons/logo.svg">
  <link rel="stylesheet" href="assets/css/Styles.css">
</head>
<body>
  <div class="page-shell dashboard-shell">
    <div class="background-orbs" aria-hidden="true">
      <span class="orb orb-1"></span>
      <span class="orb orb-2"></span>
      <span class="orb orb-3"></span>
    </div>

    <main class="dashboard-layout">
      <header class="dashboard-top">
        <div class="brand">
          <img class="brand-mark" src="assets/icons/logo.svg" alt="Logo MedCare">
          <div>
            <p class="brand-kicker">Panel principal</p>
            <h1>MedCare</h1>
          </div>
        </div>

        <a class="logout-btn" href="index.html">Cerrar sesión</a>
      </header>

      <section class="dashboard-card dashboard-intro">
        <p class="section-label">Bienvenido</p>
        <h2>Selecciona el módulo que deseas abrir</h2>
        <p>
          Desde aquí puedes entrar a triaje o a análisis de laboratorio con un solo clic.
        </p>
      </section>

      <section class="dashboard-grid">
        <a class="service-card" href="Triaje.html" role="button">
          <img src="assets/img/triaje.svg" alt="Triaje">
          <div class="service-copy">
            <p class="service-kicker">Módulo 01</p>
            <h3>Triaje</h3>
            <span>Evaluación inicial del paciente</span>
          </div>
        </a>

        <a class="service-card" href="Analisis.html" role="button">
          <img src="assets/img/laboratorio.svg" alt="Análisis de laboratorio">
          <div class="service-copy">
            <p class="service-kicker">Módulo 02</p>
            <h3>Análisis de laboratorio</h3>
            <span>Resultados y estudios clínicos</span>
          </div>
        </a>
      </section>
    </main>
  </div>
</body>
</html>
